<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirection — Pronote</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #16213E;
    color: #fff;
    font-family: system-ui, sans-serif;
    text-align: center;
  }
  .box { padding: 24px; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(200,155,60,0.3);
    border-top-color: #C89B3C;
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { margin: 6px 0; font-size: 14px; color: #C6CBDA; }
  a { color: #C89B3C; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Redirection vers le portail…</p>
    <p><a id="fallbackLink" href="/">Cliquez ici si la page ne change pas automatiquement</a></p>
  </div>
  <script>
    // Calcule l'adresse du portail en retirant "/login" (avec ou sans / final)
    // de l'URL actuelle — fonctionne quel que soit le nom du dépôt GitHub,
    // pas besoin de le coder en dur.
    var target = window.location.pathname.replace(/\/login\/?$/, '/') || '/';
    document.getElementById('fallbackLink').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
